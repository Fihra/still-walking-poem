<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Turret+Road:wght@200;300;400;500;700;800&display=swap" rel="stylesheet">
            <link rel="stylesheet" href="style.css">
    <title>Still Walking</title>
</head>
<body>
    <div class="container main-bg">
        <input type="checkbox" id="toggle-switch" />
        <main>
            <h1 id="start-poem" class="main-title" title="Multiple paths up ahead"><label for="toggle-switch">Still Walking</label></h1>
        </main>

        <div class="content">
            <!-- <a class="walking-text second-line" href="#">Walking treading strolling</a> -->
             <div class="walk-tread-stroll-container">
                <div class="grid-container"></div>
                <div class="walk-container grid-container floating-text" title="↓">
                        <span>W</span>
                        <span>a</span>
                        <span>l</span>
                        <span>k</span>
                        <span>i</span>
                        <span>n</span>
                        <span>g</span>
                    </div>
                    <span class="walking-path">Is there a destination?</span>
                    <div class="grid-container"></div>
                    <div class="tread-container grid-container floating-text"  title="↘">
                        <span>T</span>
                        <span>r</span>
                        <span>e</span>
                        <span>a</span>
                        <span>d</span>
                        <span>i</span>
                        <span>n</span>
                        <span>g</span>
                    </div>
                    <span class="treading-path">Is there an end?</span>
                     <div class="grid-container"></div>
                    <div class="stroll-container grid-container floating-text" title="↙">
                        <span>S</span>
                        <span>t</span>
                        <span>r</span>
                        <span>o</span>
                        <span>l</span>
                        <span>l</span>
                        <span>i</span>
                        <span>n</span>
                        <span>g</span>
                    </div>
                    <span class="strolling-path">Am I wandering to an abyss?</span>
                    <div class="grid-container"></div>
                    <div class="grid-container"></div>
                    <div class="grid-container"></div>
                    <div class="grid-container"></div>
                    <div class="grid-container"></div>
                    <div class="grid-container">
                        <div class="third-line">Yet the roads perpetually extend</div>
                        <div class="yet-stuck"><span>Yet, here I am, stuck</span></div>
                        <div class="still-still"> <span>Still trying, still walking</span></div>
                    </div>
                    <div class="grid-container"></div>
                    <div class="grid-container"></div>
                    <div class="grid-container"></div>
                    <div class="grid-container"></div>
                    <div class="grid-container"></div>
                    <div class="grid-container"></div>
                    <div class="grid-container">
                        <div class="fourth-line">As I switch to another</div>
                        <div class="others-chose-their-path">
                            <span>Others</span>
                            <span>chose</span>
                            <span>their</span>
                            <span>path</span>
                        </div>
                        <div class="reaching-further">
                            <span>Reaching</span>
                            <span>further</span>
                        </div>
                </div>
                    <div class="grid-container"></div>
                    <div class="grid-container"></div>
                    <div class="grid-container"></div>
                    <div class="grid-container"></div>
                    <div class="grid-container"></div>
                    

             </div>
 
        </div>
    </div>
</body>
</html>
