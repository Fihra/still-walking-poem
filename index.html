<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Turret+Road:wght@200;300;400;500;700;800&display=swap" rel="stylesheet">
            <link rel="stylesheet" href="style.css">
    <title>Still Walking</title>
</head>
<body>
    <div class="container main-bg">
        <input type="checkbox" id="toggle-switch" />
        <main>
            <h1 id="start-poem" class="main-title" title="Multiple paths up ahead"><label for="toggle-switch">Still Walking</label></h1>
        </main>

        <div class="content">
            <a class="walking-text second-line" href="#">Walking treading strolling</a>
            <div class="walk-container" id="falling-text">
                <span>W</span>
                <span>a</span>
                <span>l</span>
                <span>k</span>
                <span>i</span>
                <span>n</span>
                <span>g</span>
            </div>
            <div class="tread-container" id="falling-text">
                <span>T</span>
                <span>r</span>
                <span>e</span>
                <span>a</span>
                <span>d</span>
                <span>i</span>
                <span>n</span>
                <span>g</span>
            </div>
            <div class="stroll-container" id="falling-text">
                <span>S</span>
                <span>t</span>
                <span>r</span>
                <span>o</span>
                <span>l</span>
                <span>l</span>
                <span>i</span>
                <span>n</span>
                <span>g</span>
            </div>
        </div>
    </div>
</body>
</html>
